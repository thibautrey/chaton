name: Deploy Chatons Cloud to Kubernetes

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/chaton
  K8S_NAMESPACE: chatons-cloud

jobs:
  build-and-deploy:
    name: Build images and deploy to Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push cloud-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cloud-api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/cloud-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/cloud-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cloud-realtime
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/cloud-realtime/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/cloud-realtime:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/cloud-realtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push runtime-headless
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/runtime-headless/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/runtime-headless:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/runtime-headless:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -z "$KUBE_CONFIG_DATA" ]; then
            echo "KUBE_CONFIG secret is empty"
            exit 1
          fi
          if printf '%s' "$KUBE_CONFIG_DATA" | base64 --decode > "$HOME/.kube/config" 2>/dev/null; then
            echo "Decoded kubeconfig from base64 secret"
          else
            printf '%s' "$KUBE_CONFIG_DATA" > "$HOME/.kube/config"
            echo "KUBE_CONFIG secret was not valid base64; wrote it as raw kubeconfig"
          fi
          if ! grep -q '^apiVersion:' "$HOME/.kube/config"; then
            echo "Decoded KUBE_CONFIG does not look like a kubeconfig"
            exit 1
          fi
          if grep -q '^kind: Secret$' "$HOME/.kube/config"; then
            echo "KUBE_CONFIG contains a Kubernetes Secret manifest, not a kubeconfig."
            echo "Store the kubeconfig itself in the GitHub secret, either raw YAML or base64-encoded."
            exit 1
          fi
          if ! grep -q '^kind: Config$' "$HOME/.kube/config"; then
            echo "Decoded KUBE_CONFIG is not a kubeconfig (expected kind: Config)."
            exit 1
          fi
          chmod 600 "$HOME/.kube/config"
          kubectl config get-contexts
          kubectl config current-context

      - name: Validate cluster connectivity
        run: |
          kubectl version --client
          kubectl cluster-info

      - name: Ensure namespace exists
        run: |
          kubectl get namespace "${K8S_NAMESPACE}" >/dev/null 2>&1 || kubectl create namespace "${K8S_NAMESPACE}"

      - name: Apply cloud secrets manifest
        env:
          CHATONS_CLOUD_SECRETS_YAML: ${{ secrets.CHATONS_CLOUD_SECRETS_YAML }}
        run: |
          if [ -n "$CHATONS_CLOUD_SECRETS_YAML" ]; then
            printf '%s' "$CHATONS_CLOUD_SECRETS_YAML" | kubectl apply -f -
          fi

      - name: Create or update GHCR pull secret
        env:
          GHCR_USERNAME: ${{ secrets.GHCR_PULL_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "$GHCR_TOKEN" ]; then
            echo "GHCR_PULL_TOKEN secret is empty"
            exit 1
          fi
          kubectl -n "${K8S_NAMESPACE}" create secret docker-registry ghcr-auth \
            --docker-server="${REGISTRY}" \
            --docker-username="${GHCR_USERNAME}" \
            --docker-password="${GHCR_TOKEN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests with commit image tags
        run: |
          cp -R k8s/base /tmp/chatons-k8s
          cat <<EOF >> /tmp/chatons-k8s/kustomization.yaml
          images:
            - name: ghcr.io/chatons/cloud-api
              newName: ${{ env.IMAGE_PREFIX }}/cloud-api
              newTag: ${{ github.sha }}
            - name: ghcr.io/chatons/cloud-realtime
              newName: ${{ env.IMAGE_PREFIX }}/cloud-realtime
              newTag: ${{ github.sha }}
            - name: ghcr.io/chatons/runtime-headless
              newName: ${{ env.IMAGE_PREFIX }}/runtime-headless
              newTag: ${{ github.sha }}
          EOF
          kustomize build /tmp/chatons-k8s | kubectl apply -f -

      - name: Attach imagePullSecrets to default service account
        run: |
          kubectl patch serviceaccount default \
            -n "${K8S_NAMESPACE}" \
            --type merge \
            -p '{"imagePullSecrets":[{"name":"ghcr-auth"}]}'

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cloud-api -n "${K8S_NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/cloud-realtime -n "${K8S_NAMESPACE}" --timeout=180s
          kubectl rollout status deployment/runtime-headless -n "${K8S_NAMESPACE}" --timeout=180s
