name: Build macOS Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-macos:
    name: Build macOS Apps (ARM64 & x64)
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build macOS ARM64 (Apple Silicon)
        run: npm run dist -- --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS x64 (Intel)
        run: npm run dist -- --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        run: ls -la release/

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chaton-macOS-ARM64
          path: release/*.dmg
          if-no-files-found: error

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chaton-macOS-x64
          path: release/*.dmg
          if-no-files-found: error

      - name: Create Release (on main branch only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release ${{ github.run_number }}
          body: Automatic build from commit ${{ github.sha }}
          draft: false
          prerelease: false
          files: release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
