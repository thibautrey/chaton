          if-no-files-found: error

  release:
    permissions:
      contents: write

    name: Create Release
    needs:
      [
        determine-version,
        build-macos-arm64,
        build-macos-x64,
        build-windows,
        build-linux,
      ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get current version from package.json
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f

      - name: Generate Release Notes with AI
        id: generate_notes
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            // Get the latest published release to use as baseline
            let sinceDate = null;
            let previousTag = null;
            try {
              const { data: latestRelease } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              sinceDate = latestRelease.published_at;
              previousTag = latestRelease.tag_name;
            } catch (e) {
              // No previous release exists, include everything
            }

            // Fetch commits since the last release
            const commitParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              per_page: 100,
            };
            if (sinceDate) commitParams.since = sinceDate;

            const { data: commits } = await github.rest.repos.listCommits(commitParams);

            // Fetch closed PRs merged since the last release
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              sort: 'updated',
              direction: 'desc',
              per_page: 50,
            });

            const changes = [];

            // Collect PRs merged after the previous release
            for (const pr of prs) {
              if (!pr.merged_at) continue;
              if (sinceDate && new Date(pr.merged_at) <= new Date(sinceDate)) continue;
              changes.push(`- ${pr.title} (PR #${pr.number})`);
            }

            // Collect conventional commits not already covered by a PR
            const prCommitShas = new Set(prs.filter(pr => pr.merge_commit_sha).map(pr => pr.merge_commit_sha));
            for (const commit of commits) {
              if (prCommitShas.has(commit.sha)) continue;
              const match = commit.commit.message.match(/^(feat|fix|docs|style|refactor|perf|test|chore)(?:\(.+\))?: (.+)/);
              if (match) {
                changes.push(`- ${match[1]}: ${match[2]}`);
              }
            }

            const compareBase = previousTag || `v${process.env.CURRENT_VERSION}`;
            const releaseNotes = [
              '## What\'s Changed',
              '',
              changes.length > 0 ? changes.join('\n') : '- Minor improvements and bug fixes',
              '',
              '## Downloads',
              '',
              '- **macOS**: Apple Silicon (ARM64) and Intel (x64) .dmg files',
              '- **Windows**: .exe installer',
              '- **Linux**: .AppImage',
              '',
              `Full Changelog: https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${compareBase}...v${process.env.NEW_VERSION}`,
            ].join('\n');

            core.setOutput('release_notes', releaseNotes);
            return releaseNotes;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.determine-version.outputs.new_version }}
          name: Release v${{ needs.determine-version.outputs.new_version }}
          body: ${{ steps.generate_notes.outputs.release_notes || format('Automatic multi-platform build from commit {0}', github.sha) }}
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CURRENT_VERSION: ${{ steps.current_version.outputs.current_version }}
          NEW_VERSION: ${{ needs.determine-version.outputs.new_version }}
