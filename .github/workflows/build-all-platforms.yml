name: Build All Platforms

on:
  push:
    branches: [main]
    paths-ignore:
      - package.json
      - README.md
      - '**.md'
  pull_request:
    branches: [main]

jobs:
  build-macos:
    name: Build macOS Apps (ARM64 & x64)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine macOS signing mode
        id: mac_signing
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE || secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PWD || secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD || secrets.MAC_CERTIFICATE_PWD }}
          CSC_NAME: ${{ secrets.MAC_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          HAS_CERT_SECRETS=true
          HAS_NOTARY_SECRETS=true

          if [ -z "$BUILD_CERTIFICATE_BASE64" ] || [ -z "$P12_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
            HAS_CERT_SECRETS=false
          fi
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            HAS_NOTARY_SECRETS=false
          fi

          if [ "$HAS_CERT_SECRETS" = "true" ]; then
            echo "signing_enabled=true" >> "$GITHUB_OUTPUT"
            if [ "$HAS_NOTARY_SECRETS" = "true" ]; then
              echo "notarize_enabled=true" >> "$GITHUB_OUTPUT"
              echo "macOS build mode: signed + notarized"
            else
              echo "notarize_enabled=false" >> "$GITHUB_OUTPUT"
              echo "macOS build mode: signed only (missing notarization secrets)"
            fi
          else
            echo "signing_enabled=false" >> "$GITHUB_OUTPUT"
            echo "notarize_enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS build mode: unsigned (missing signing certificate secrets)"
          fi

      - name: Prepare macOS signing keychain
        if: steps.mac_signing.outputs.signing_enabled == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MAC_CERTIFICATE || secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PWD || secrets.MACOS_CERTIFICATE_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD || secrets.MAC_CERTIFICATE_PWD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build macOS ARM64 (Apple Silicon, signed/notarized)
        if: steps.mac_signing.outputs.signing_enabled == 'true'
        run: npx electron-builder --mac dmg --arm64 --publish never --config.mac.notarize=${{ steps.mac_signing.outputs.notarize_enabled }}
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          CSC_FOR_PULL_REQUEST: true
          CSC_FOR_PULL_REQUEST_IF_PRIVATE: true
          CSC_NAME: ${{ secrets.MAC_DEVELOPER_ID }}
          DEBUG: electron-notarize*
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          USE_HARD_LINKS: false

      - name: Build macOS x64 (Intel, signed/notarized)
        if: steps.mac_signing.outputs.signing_enabled == 'true'
        run: npx electron-builder --mac dmg --x64 --publish never --config.mac.notarize=${{ steps.mac_signing.outputs.notarize_enabled }}
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: true
          CSC_FOR_PULL_REQUEST: true
          CSC_FOR_PULL_REQUEST_IF_PRIVATE: true
          CSC_NAME: ${{ secrets.MAC_DEVELOPER_ID }}
          DEBUG: electron-notarize*
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          USE_HARD_LINKS: false

      - name: Build macOS ARM64 (Apple Silicon, unsigned)
        if: steps.mac_signing.outputs.signing_enabled != 'true'
        run: npx electron-builder --mac dmg --arm64 --publish never --config.mac.notarize=false
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

      - name: Build macOS x64 (Intel, unsigned)
        if: steps.mac_signing.outputs.signing_enabled != 'true'
        run: npx electron-builder --mac dmg --x64 --publish never --config.mac.notarize=false
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

      - name: Validate signed/notarized DMGs
        if: steps.mac_signing.outputs.signing_enabled == 'true'
        run: |
          shopt -s nullglob
          DMGS=(release/*.dmg)
          if [ ${#DMGS[@]} -eq 0 ]; then
            echo "No DMG artifacts found in release/."
            exit 1
          fi
          for dmg in "${DMGS[@]}"; do
            echo "Validating $dmg"
            xcrun stapler validate "$dmg"
            spctl -a -t open --context context:primary-signature -v "$dmg"

            MOUNT_POINT="$RUNNER_TEMP/mount-$(basename "$dmg" .dmg)"
            mkdir -p "$MOUNT_POINT"
            hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$MOUNT_POINT"
            APP_PATH=$(find "$MOUNT_POINT" -maxdepth 1 -name "*.app" | head -n 1)
            if [ -z "$APP_PATH" ]; then
              echo "No .app found inside $dmg"
              hdiutil detach "$MOUNT_POINT" -force || true
              exit 1
            fi

            echo "Checking signature for $APP_PATH"
            codesign --verify --deep --strict --verbose=2 "$APP_PATH"
            spctl -a -vv -t exec "$APP_PATH"

            hdiutil detach "$MOUNT_POINT"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Chaton-macOS
          path: release/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Windows
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Chaton-Windows
          path: release/*.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Electron main process
        run: npm run build:electron

      - name: Build Linux
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Chaton-Linux
          path: release/*.AppImage
          if-no-files-found: error

  release:
    permissions:
      contents: write

    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Determine semantic version
        id: version
        run: |
          NEW_VERSION=$(node scripts/version.js)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Determined version: $NEW_VERSION"

      - name: Commit version update
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add package.json
          if git diff --cached --quiet; then
            echo "No package.json changes to commit"
            exit 0
          fi
          git commit -m "chore: update version to v${{ steps.version.outputs.new_version }} [skip ci]"
          git push

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f

      - name: Generate Release Notes with AI
        id: generate_notes
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: 'main',
              sort: 'updated',
              direction: 'desc'
            });

            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: 'main',
              per_page: 20
            });

            const changes = [];

            // Analyze recent PRs
            for (const pr of prs.slice(0, 10)) {
              if (pr.merged_at && new Date(pr.merged_at) > new Date(Date.now() - 30 * 24 * 60 * 60 * 1000)) {
                changes.push(`- ${pr.title} (PR #${pr.number})`);
              }
            }

            // Analyze recent commits
            for (const commit of commits.slice(0, 15)) {
              const match = commit.commit.message.match(/^(feat|fix|docs|style|refactor|perf|test|chore)(?:\(.+\))?: (.+)/);
              if (match) {
                changes.push(`- ${match[1]}: ${match[2]}`);
              }
            }

            const releaseNotes = `
            ## What's Changed

            ${changes.join('\n')}

            ## Downloads

            - **macOS**: Apple Silicon (ARM64) and Intel (x64) .dmg files
            - **Windows**: .exe installer
            - **Linux**: .AppImage

            Full Changelog: https://github.com/${context.repo.owner}/${context.repo.repo}/compare/v${process.env.CURRENT_VERSION}...v${process.env.NEW_VERSION}
            `;

            core.setOutput('release_notes', releaseNotes);
            return releaseNotes;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          body: ${{ steps.generate_notes.outputs.release_notes || format('Automatic multi-platform build from commit {0}', github.sha) }}
          draft: false
          prerelease: false
          files: artifacts/**/*
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CURRENT_VERSION: ${{ steps.version.outputs.new_version }}
