<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1728;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080c17;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1728;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="activeCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="1440" height="900" fill="url(#bgGradient)"/>
  
  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="900" fill="#0a0f1f" opacity="0.8"/>
  <line x1="240" y1="0" x2="240" y2="900" stroke="#2d3a5a" stroke-width="1" opacity="0.5"/>
  
  <!-- Sidebar Items -->
  <rect x="16" y="20" width="208" height="40" rx="8" fill="transparent"/>
  <circle cx="32" cy="40" r="4" fill="#9ca3af"/>
  <text x="48" y="46" font-family="Inter" font-size="14" fill="#94a3b8">Projects</text>
  
  <rect x="16" y="70" width="208" height="40" rx="8" fill="#2563eb" opacity="0.3"/>
  <circle cx="32" cy="90" r="4" fill="#60a5fa"/>
  <text x="48" y="96" font-family="Inter" font-size="14" fill="#e2e8f0">AI Providers</text>
  
  <rect x="16" y="120" width="208" height="40" rx="8" fill="transparent"/>
  <circle cx="32" cy="140" r="4" fill="#9ca3af"/>
  <text x="48" y="146" font-family="Inter" font-size="14" fill="#94a3b8">Settings</text>
  
  <!-- Main Content -->
  <rect x="240" y="0" width="1200" height="60" fill="#0a0f1f" opacity="0.9"/>
  <line x1="240" y1="60" x2="1440" y2="60" stroke="#2d3a5a" stroke-width="1" opacity="0.5"/>
  
  <!-- Header -->
  <text x="260" y="40" font-family="Inter" font-size="18" font-weight="600" fill="#f8fafc">AI Providers</text>
  
  <!-- Content -->
  <text x="260" y="100" font-family="Inter" font-size="14" fill="#94a3b8">Choose your AI model. Switch anytime. No lock-in.</text>
  
  <!-- Provider Cards Grid -->
  <g>
    <!-- ChatGPT - Active -->
    <rect x="260" y="130" width="280" height="280" rx="14" fill="url(#activeCard)" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="290" cy="160" r="24" fill="#60a5fa" opacity="0.2"/>
    <text x="275" y="168" font-family="Inter" font-size="20" fill="#60a5fa">⚡</text>
    
    <text x="330" y="165" font-family="Inter" font-size="16" font-weight="600" fill="#f8fafc">ChatGPT</text>
    <text x="330" y="185" font-family="Inter" font-size="12" fill="#cbd5e1">OpenAI GPT-4 Turbo</text>
    
    <rect x="280" y="210" width="240" height="50" rx="8" fill="#1e2847" opacity="0.6"/>
    <text x="295" y="230" font-family="Inter" font-size="12" fill="#cbd5e1">Context: 128k tokens</text>
    <text x="295" y="248" font-family="Inter" font-size="12" fill="#cbd5e1">Speed: ⭐⭐⭐⭐⭐</text>
    
    <rect x="280" y="270" width="240" height="36" rx="6" fill="#2563eb" opacity="0.5" stroke="#60a5fa" stroke-width="1"/>
    <text x="340" y="293" font-family="Inter" font-size="13" font-weight="600" fill="#60a5fa">✓ Using</text>
  </g>
  
  <!-- Claude -->
  <g>
    <rect x="580" y="130" width="280" height="280" rx="14" fill="url(#cardGradient)" stroke="#3f46e6" stroke-width="1" opacity="0.4"/>
    <circle cx="610" cy="160" r="24" fill="#8b5cf6" opacity="0.2"/>
    <text x="595" y="168" font-family="Inter" font-size="20" fill="#8b5cf6">🧠</text>
    
    <text x="650" y="165" font-family="Inter" font-size="16" font-weight="600" fill="#f8fafc">Claude 3</text>
    <text x="650" y="185" font-family="Inter" font-size="12" fill="#cbd5e1">Anthropic Claude Opus</text>
    
    <rect x="600" y="210" width="240" height="50" rx="8" fill="#1e2847" opacity="0.6"/>
    <text x="615" y="230" font-family="Inter" font-size="12" fill="#cbd5e1">Context: 200k tokens</text>
    <text x="615" y="248" font-family="Inter" font-size="12" fill="#cbd5e1">Speed: ⭐⭐⭐⭐</text>
    
    <rect x="600" y="270" width="240" height="36" rx="6" fill="#2d3a5a" opacity="0.5"/>
    <text x="650" y="293" font-family="Inter" font-size="13" fill="#94a3b8">Switch to Claude</text>
  </g>
  
  <!-- GitHub Copilot -->
  <g>
    <rect x="900" y="130" width="280" height="280" rx="14" fill="url(#cardGradient)" stroke="#3f46e6" stroke-width="1" opacity="0.4"/>
    <circle cx="930" cy="160" r="24" fill="#6366f1" opacity="0.2"/>
    <text x="915" y="168" font-family="Inter" font-size="20" fill="#6366f1">🐙</text>
    
    <text x="970" y="165" font-family="Inter" font-size="16" font-weight="600" fill="#f8fafc">GitHub Copilot</text>
    <text x="970" y="185" font-family="Inter" font-size="12" fill="#cbd5e1">Enterprise Ready</text>
    
    <rect x="920" y="210" width="240" height="50" rx="8" fill="#1e2847" opacity="0.6"/>
    <text x="935" y="230" font-family="Inter" font-size="12" fill="#cbd5e1">Context: 32k tokens</text>
    <text x="935" y="248" font-family="Inter" font-size="12" fill="#cbd5e1">Speed: ⭐⭐⭐⭐⭐</text>
    
    <rect x="920" y="270" width="240" height="36" rx="6" fill="#2d3a5a" opacity="0.5"/>
    <text x="970" y="293" font-family="Inter" font-size="13" fill="#94a3b8">Switch to Copilot</text>
  </g>
  
  <!-- Local Models -->
  <g>
    <rect x="260" y="440" width="280" height="280" rx="14" fill="url(#cardGradient)" stroke="#3f46e6" stroke-width="1" opacity="0.4"/>
    <circle cx="290" cy="470" r="24" fill="#10b981" opacity="0.2"/>
    <text x="275" y="478" font-family="Inter" font-size="20" fill="#10b981">🖥️</text>
    
    <text x="330" y="475" font-family="Inter" font-size="16" font-weight="600" fill="#f8fafc">Local Models</text>
    <text x="330" y="495" font-family="Inter" font-size="12" fill="#cbd5e1">Ollama, Llama 2, Mistral</text>
    
    <rect x="280" y="520" width="240" height="50" rx="8" fill="#1e2847" opacity="0.6"/>
    <text x="295" y="540" font-family="Inter" font-size="12" fill="#cbd5e1">Context: Varies</text>
    <text x="295" y="558" font-family="Inter" font-size="12" fill="#cbd5e1">Speed: ⭐⭐⭐ (private)</text>
    
    <rect x="280" y="580" width="240" height="36" rx="6" fill="#2d3a5a" opacity="0.5"/>
    <text x="325" y="603" font-family="Inter" font-size="13" fill="#94a3b8">Switch to Local</text>
  </g>
  
  <!-- Custom API -->
  <g>
    <rect x="580" y="440" width="280" height="280" rx="14" fill="url(#cardGradient)" stroke="#3f46e6" stroke-width="1" opacity="0.4"/>
    <circle cx="610" cy="470" r="24" fill="#f59e0b" opacity="0.2"/>
    <text x="595" y="478" font-family="Inter" font-size="20" fill="#f59e0b">🔧</text>
    
    <text x="650" y="475" font-family="Inter" font-size="16" font-weight="600" fill="#f8fafc">Custom API</text>
    <text x="650" y="495" font-family="Inter" font-size="12" fill="#cbd5e1">Your own endpoints</text>
    
    <rect x="600" y="520" width="240" height="50" rx="8" fill="#1e2847" opacity="0.6"/>
    <text x="615" y="540" font-family="Inter" font-size="12" fill="#cbd5e1">Context: Your choice</text>
    <text x="615" y="558" font-family="Inter" font-size="12" fill="#cbd5e1">Speed: Depends on config</text>
    
    <rect x="600" y="580" width="240" height="36" rx="6" fill="#2d3a5a" opacity="0.5"/>
    <text x="640" y="603" font-family="Inter" font-size="13" fill="#94a3b8">Configure API</text>
  </g>
  
  <!-- More Models -->
  <g>
    <rect x="900" y="440" width="280" height="280" rx="14" fill="url(#cardGradient)" stroke="#3f46e6" stroke-width="1" opacity="0.4"/>
    <circle cx="930" cy="470" r="24" fill="#ec4899" opacity="0.2"/>
    <text x="915" y="478" font-family="Inter" font-size="20" fill="#ec4899">🚀</text>
    
    <text x="970" y="475" font-family="Inter" font-size="16" font-weight="600" fill="#f8fafc">More Coming</text>
    <text x="970" y="495" font-family="Inter" font-size="12" fill="#cbd5e1">Integrations & plugins</text>
    
    <rect x="920" y="520" width="240" height="50" rx="8" fill="#1e2847" opacity="0.6"/>
    <text x="935" y="540" font-family="Inter" font-size="12" fill="#cbd5e1">Expand your options</text>
    <text x="935" y="558" font-family="Inter" font-size="12" fill="#cbd5e1">Community-built solutions</text>
    
    <rect x="920" y="580" width="240" height="36" rx="6" fill="#2d3a5a" opacity="0.5"/>
    <text x="960" y="603" font-family="Inter" font-size="13" fill="#94a3b8">View Marketplace</text>
  </g>
</svg>
