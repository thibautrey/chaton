apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-headless
  namespace: chatons-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runtime-headless
  template:
    metadata:
      labels:
        app: runtime-headless
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: runtime-headless
      containers:
        - name: runtime-headless
          image: ghcr.io/chatons/runtime-headless:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4002
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: RUNTIME_HEADLESS_PORT
            - name: CHATONS_CLOUD_VERSION
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_CLOUD_VERSION
            - name: CHATONS_RUNTIME_LEASE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_RUNTIME_LEASE_TTL_SECONDS
            - name: CHATONS_CLOUD_MAX_JSON_BODY_BYTES
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_CLOUD_MAX_JSON_BODY_BYTES
            - name: CHATONS_CLOUD_API_URL
              value: "http://cloud-api.chatons-cloud.svc.cluster.local"
            - name: CHATONS_REALTIME_PUBLISH_URL
              value: "http://cloud-realtime.chatons-cloud.svc.cluster.local/v1/realtime/events"
          envFrom:
            - secretRef:
                name: chatons-cloud-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 125m
              memory: 192Mi
            limits:
              cpu: 600m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-headless
  namespace: chatons-cloud
spec:
  selector:
    app: runtime-headless
  ports:
    - name: http
      port: 80
      targetPort: http
