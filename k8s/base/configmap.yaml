apiVersion: v1
kind: ConfigMap
metadata:
  name: chatons-cloud-config
  namespace: chatons-cloud
data:
  CHATONS_CLOUD_VERSION: "0.1.0"
  CLOUD_API_PORT: "4000"
  CLOUD_REALTIME_PORT: "4001"
  RUNTIME_HEADLESS_PORT: "4002"
  CHATONS_REALTIME_CHANNEL_PREFIX: "chatons:realtime:instance:"
  CHATONS_REALTIME_TOKEN_TTL_SECONDS: "300"
  CHATONS_REALTIME_MAX_SOCKETS_PER_INSTANCE: "200"
  CHATONS_REALTIME_REPLAY_BUFFER_SIZE: "100"
  CHATONS_RUNTIME_LEASE_TTL_SECONDS: "60"
  CHATONS_DESKTOP_AUTH_REQUEST_TTL_SECONDS: "300"
  CHATONS_CLOUD_MAX_JSON_BODY_BYTES: "1048576"
  NODE_ENV: "production"
