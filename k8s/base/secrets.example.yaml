apiVersion: v1
kind: Secret
metadata:
  name: chatons-cloud-secrets
  namespace: chatons-cloud
type: Opaque
stringData:
  POSTGRES_PASSWORD: "replace-with-strong-postgres-password"
  DATABASE_URL: "postgres://chatons:replace-with-strong-postgres-password@postgres.chatons-cloud.svc.cluster.local:5432/chatons"
  REDIS_URL: "redis://redis.chatons-cloud.svc.cluster.local:6379"
  CHATONS_INTERNAL_SERVICE_TOKEN: "replace-with-long-random-secret"
  OIDC_CLIENT_ID: "chatons-desktop"
  OIDC_CLIENT_SECRET: "replace-me-if-oidc-is-implemented"
  OIDC_ISSUER_URL: "https://cloud.chatons.ai"
  JWT_SIGNING_KEY: "replace-with-32-plus-char-random-signing-key"
