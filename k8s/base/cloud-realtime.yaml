apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-realtime
  namespace: chatons-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloud-realtime
  template:
    metadata:
      labels:
        app: cloud-realtime
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: cloud-realtime
      containers:
        - name: cloud-realtime
          image: ghcr.io/chatons/cloud-realtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CLOUD_REALTIME_PORT
            - name: CHATONS_CLOUD_VERSION
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_CLOUD_VERSION
            - name: CHATONS_REALTIME_CHANNEL_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_REALTIME_CHANNEL_PREFIX
            - name: CHATONS_REALTIME_TOKEN_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_REALTIME_TOKEN_TTL_SECONDS
            - name: CHATONS_REALTIME_MAX_SOCKETS_PER_INSTANCE
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_REALTIME_MAX_SOCKETS_PER_INSTANCE
            - name: CHATONS_REALTIME_REPLAY_BUFFER_SIZE
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_REALTIME_REPLAY_BUFFER_SIZE
            - name: CHATONS_CLOUD_MAX_JSON_BODY_BYTES
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_CLOUD_MAX_JSON_BODY_BYTES
            - name: CHATONS_CLOUD_API_URL
              value: "http://cloud-api.chatons-cloud.svc.cluster.local"
          envFrom:
            - secretRef:
                name: chatons-cloud-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-realtime
  namespace: chatons-cloud
spec:
  selector:
    app: cloud-realtime
  ports:
    - name: http
      port: 80
      targetPort: http
