apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-api
  namespace: chatons-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-api
  template:
    metadata:
      labels:
        app: cloud-api
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: cloud-api
      containers:
        - name: cloud-api
          image: ghcr.io/chatons/cloud-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CLOUD_API_PORT
            - name: CHATONS_CLOUD_VERSION
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_CLOUD_VERSION
            - name: CHATONS_DESKTOP_AUTH_REQUEST_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_DESKTOP_AUTH_REQUEST_TTL_SECONDS
            - name: CHATONS_REALTIME_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_REALTIME_PUBLIC_URL
            - name: CHATONS_RUNTIME_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_RUNTIME_PUBLIC_URL
            - name: CHATONS_CLOUD_MAX_JSON_BODY_BYTES
              valueFrom:
                configMapKeyRef:
                  name: chatons-cloud-config
                  key: CHATONS_CLOUD_MAX_JSON_BODY_BYTES
          envFrom:
            - secretRef:
                name: chatons-cloud-secrets
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 75m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 384Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-api
  namespace: chatons-cloud
spec:
  selector:
    app: cloud-api
  ports:
    - name: http
      port: 80
      targetPort: http
