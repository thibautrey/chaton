<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IDE Launcher Widget</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: transparent;
        overflow: hidden;
      }
      .widget {
        height: 34px;
        display: flex;
        align-items: center;
        gap: 4px;
        justify-content: flex-end;
      }
      .btn {
        height: 34px;
        min-width: 34px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 8px;
      }
      .btn:hover {
        background: rgba(127, 127, 127, 0.12);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .dropdown {
        position: fixed;
        top: 40px;
        right: 0;
        min-width: 180px;
        display: none;
        flex-direction: column;
        gap: 4px;
        padding: 6px;
        border-radius: 12px;
        border: 1px solid rgba(127, 127, 127, 0.24);
        background: rgba(20, 25, 34, 0.98);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        z-index: 10;
      }
      .dropdown.open {
        display: flex;
      }
      .option {
        height: 34px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: inherit;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 10px;
        text-align: left;
      }
      .option:hover,
      .option.active {
        background: rgba(96, 165, 250, 0.16);
      }
      .icon {
        width: 16px;
        height: 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
      }
      img.icon-image {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="widget">
      <button id="launchButton" class="btn" type="button" aria-label="IDE Launcher" title="IDE Launcher">...</button>
      <button id="toggleButton" class="btn" type="button" aria-label="Choose IDE" title="Choose IDE">▾</button>
    </div>
    <div id="dropdown" class="dropdown"></div>
    <script src="./index.js"></script>
  </body>
</html>
